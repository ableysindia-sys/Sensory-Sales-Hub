substitutions:
  _REGION: asia-south1
  _SERVICE: sensory-sales-hub
  _REPO: sensory-sales-hub
  _DB_INSTANCE: sensory-sales-hub-db

steps:
  # ── 1. Build Docker image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # ── 2. Push image to Artifact Registry ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # ── 3. Deploy to Cloud Run ───────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_DB_INSTANCE}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,SHOPIFY_STORE_DOMAIN=SHOPIFY_STORE_DOMAIN:latest,SHOPIFY_STOREFRONT_TOKEN=SHOPIFY_STOREFRONT_TOKEN:latest,SHOPIFY_CLIENT_SECRET=SHOPIFY_CLIENT_SECRET:latest,RAZORPAY_KEY_ID=RAZORPAY_KEY_ID:latest,RAZORPAY_KEY_SECRET=RAZORPAY_KEY_SECRET:latest
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --port=8080
      - --timeout=60

  # ── 4. Build frontend (for Firebase Hosting) ─────────────────────────────────
  - name: node:24-slim
    entrypoint: bash
    args:
      - -c
      - |
        npm ci && npm run build

  # ── 5. Deploy frontend to Firebase Hosting ───────────────────────────────────
  - name: node:24-slim
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $PROJECT_ID --token $$FIREBASE_TOKEN
    secretEnv:
      - FIREBASE_TOKEN

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_TOKEN/versions/latest
      env: FIREBASE_TOKEN

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
